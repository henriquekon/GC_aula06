services:
  nginx:
    build: .
    container_name: my-nginx
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/custom.conf:ro
    restart: unless-stopped
    networks:
      - web-network

  postgres:
    image: postgres:15-alpine
    container_name: my-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receitas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web-network

  python-app:
    image: python:3.12-slim
    container_name: create_db
    volumes:
      - ./scripts:/app
    working_dir: /app
    command: tail -f /dev/null
    depends_on:
      - postgres
    networks:
      - web-network

  api:
    build: ./api
    container_name: minha-api
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: receitas
    depends_on:
      - postgres
    networks:
      - web-network

volumes:
  postgres-data:

networks:
  web-network:
    driver: bridge