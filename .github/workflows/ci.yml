name: CI – Testes e Qualidade

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Linter + 20 testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Instalar dependências
        run: pip install flask flask-cors psycopg2-binary reportlab pytest flake8

      - name: Análise de qualidade (Flake8)
        run: flake8 api/app.py --max-line-length=120

      - name: Executar testes
        run: python -m pytest tests/tests.py -v --tb=short