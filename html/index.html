<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Demo - Gerência de Configuração</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            margin: 20px;
        }
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .docker-icon {
            font-size: 80px;
            margin: 20px 0;
        }
        .info {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info h3 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        .status {
            background: #4caf50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
        }
        code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="docker-icon">🐳</div>
        <h1>Docker + Nginx</h1>
        <h2>Gerência de Configuração</h2>
        
        <div class="info">
            <h3>Informações do Container:</h3>
            <p><strong>Servidor:</strong> Nginx</p>
            <p><strong>Plataforma:</strong> Docker</p>
            <p><strong>Status:</strong> <span style="color:#4caf50;">● Rodando</span></p>
            <p><strong>Data/Hora:</strong> <span id="datetime"></span></p>
        </div>
        
        <div class="status">
            Deploy realizado com sucesso via GitHub!
        </div>
        
        <div class="footer">
            <p>Disciplina: Gerência de Configuração | Demonstração Docker</p>
        </div>
    </div>
    
    <script>
        function updateDateTime() {
            document.getElementById('datetime').innerText = new Date().toLocaleString('pt-BR');
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
