<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .filtros {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filtros button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #e0e0e0;
            font-size: 14px;
        }

        .filtros button.active {
            background: #667eea;
            color: white;
        }

        .btn-criar {
            background: #28a745;
            color: white;
            margin-left: auto;
        }

        .btn-criar:hover {
            background: #218838;
        }

        .receitas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .receita-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            position: relative;
        }

        .receita-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .receita-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .receita-card p {
            color: #666;
            margin: 10px 0;
            line-height: 1.5;
        }

        .custo {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin: 10px 0;
        }

        .tipo {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .tipo-doce {
            background: #ffe0e0;
            color: #c41e1e;
        }

        .tipo-salgada {
            background: #e0ffe0;
            color: #2e7d32;
        }

        .acoes {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-editar {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-editar:hover {
            background: #e0a800;
        }

        .btn-remover {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-remover:hover {
            background: #c82333;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-salvar {
            background: #28a745;
            color: white;
        }

        .btn-cancelar {
            background: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cardápio de Receitas</h1>
            <button class="logout-btn" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="filtros">
            <button onclick="carregarReceitas('todas')" id="btn-todas">Todas</button>
            <button onclick="carregarReceitas('doce')" id="btn-doce">Doces</button>
            <button onclick="carregarReceitas('salgada')" id="btn-salgada">Salgadas</button>
            <button class="btn-criar" onclick="abrirModalCriar()">+ Nova Receita</button>
        </div>

        <div id="receitas-container" class="receitas-grid">
            <div class="loading">Carregando receitas...</div>
        </div>
    </div>

    <!-- Modal para Criar/Editar -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Nova Receita</h2>
            <input type="hidden" id="receita-id">
            <input type="text" id="nome" placeholder="Nome da receita">
            <textarea id="descricao" placeholder="Descrição"></textarea>
            <input type="number" id="custo" step="0.01" placeholder="Custo (R$)">
            <select id="tipo_receita">
                <option value="doce">Doce</option>
                <option value="salgada">Salgada</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarReceita()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        async function verificarLogin() {
            try {
                const response = await fetch(`${API_URL}/receitas`, {
                    credentials: 'include'
                });
                if (response.status === 401) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                window.location.href = '/login.html';
            }
        }

        async function carregarReceitas(tipo = 'todas') {
            const container = document.getElementById('receitas-container');
            container.innerHTML = '<div class="loading">Carregando receitas...</div>';

            let url = `${API_URL}/receitas`;
            if (tipo !== 'todas') {
                url = `${API_URL}/receitas?tipo=${tipo}`;
            }

            const response = await fetch(url, {
                credentials: 'include'
            });
            const receitas = await response.json();

            if (receitas.length === 0) {
                container.innerHTML = '<div class="loading">Nenhuma receita encontrada</div>';
                return;
            }

            container.innerHTML = receitas.map(r => `
                <div class="receita-card">
                    <h3>${r.nome}</h3>
                    <p>${r.descricao}</p>
                    <div class="custo">R$ ${Number(r.custo).toFixed(2)}</div>
                    <span class="tipo tipo-${r.tipo_receita}">${r.tipo_receita.toUpperCase()}</span>
                    <div class="acoes">
                        <button class="btn-editar" onclick="abrirModalEditar(${r.id})">Editar</button>
                        <button class="btn-remover" onclick="removerReceita(${r.id})">Remover</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.filtros button').forEach(btn => btn.classList.remove('active'));
            if (tipo === 'todas') document.getElementById('btn-todas').classList.add('active');
            if (tipo === 'doce') document.getElementById('btn-doce').classList.add('active');
            if (tipo === 'salgada') document.getElementById('btn-salgada').classList.add('active');
        }

        async function removerReceita(id) {
            if (!confirm('Tem certeza que deseja remover esta receita?')) return;

            const response = await fetch(`${API_URL}/receitas/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });

            if (response.ok) {
                alert('Receita removida com sucesso!');
                carregarReceitas();
            } else {
                alert('Erro ao remover receita');
            }
        }

        function abrirModalCriar() {
            document.getElementById('modal-title').innerText = 'Nova Receita';
            document.getElementById('receita-id').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('custo').value = '';
            document.getElementById('tipo_receita').value = 'doce';
            document.getElementById('modal').style.display = 'block';
        }

        async function abrirModalEditar(id) {
            const response = await fetch(`${API_URL}/receitas/${id}`, {
                credentials: 'include'
            });
            const receita = await response.json();

            document.getElementById('modal-title').innerText = 'Editar Receita';
            document.getElementById('receita-id').value = receita.id;
            document.getElementById('nome').value = receita.nome;
            document.getElementById('descricao').value = receita.descricao;
            document.getElementById('custo').value = receita.custo;
            document.getElementById('tipo_receita').value = receita.tipo_receita;
            document.getElementById('modal').style.display = 'block';
        }

        async function salvarReceita() {
            const id = document.getElementById('receita-id').value;
            const nome = document.getElementById('nome').value;
            const descricao = document.getElementById('descricao').value;
            const custo = parseFloat(document.getElementById('custo').value);
            const tipo_receita = document.getElementById('tipo_receita').value;

            if (!nome || !descricao || !custo || !tipo_receita) {
                alert('Preencha todos os campos!');
                return;
            }

            const data = { nome, descricao, custo, tipo_receita };
            
            let url = `${API_URL}/receitas`;
            let method = 'POST';

            if (id) {
                url = `${API_URL}/receitas/${id}`;
                method = 'PUT';
            }

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert(id ? 'Receita atualizada!' : 'Receita criada!');
                fecharModal();
                carregarReceitas();
            } else {
                alert('Erro ao salvar receita');
            }
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function fazerLogout() {
            await fetch(`${API_URL}/logout`, { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                fecharModal();
            }
        }

        verificarLogin();
        carregarReceitas();
    </script>
</body>
</html>
